name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    strategy:
      matrix:
        node-version: ['18.x', '20.x', '22.x']

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libpng++-dev xauth xvfb

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: xvfb-run -a npm test

      - name: Package contents check
        run: npm run test:package

  windows-smoke:
    strategy:
      matrix:
        node-version: ['18.x', '20.x', '22.x']

    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies without native postinstall scripts
        run: npm ci --ignore-scripts

      - name: Windows launcher and config smoke tests
        run: node --test test/unit/keyboard-and-launcher.test.js test/unit/mcp-config.test.js test/unit/logging.test.js

  coverage:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libx11-dev libxtst-dev libpng++-dev xauth xvfb

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Coverage
        run: xvfb-run -a npm run test:coverage

      - name: Package contents check
        run: npm run test:package

      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/