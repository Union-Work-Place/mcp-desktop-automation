name: Bug report
description: Report a functional defect in the MCP server
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: Linux, Windows 11, macOS, container, CI, etc.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Relevant MCP output or stderr logs
      render: text